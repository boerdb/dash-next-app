<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5"/>
      <stop offset="60%" style="stop-color:#64b5f6"/>
      <stop offset="100%" style="stop-color:#fff9c4"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff59d"/>
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#sky)"/>
  <circle cx="620" cy="90" r="70" fill="url(#sun)"/>
  <circle cx="620" cy="90" r="45" fill="#ffeb3b" opacity="0.9"/>
</svg>
